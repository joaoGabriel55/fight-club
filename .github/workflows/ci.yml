name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend - Audit, Lint, Typecheck, Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fight_club
          POSTGRES_PASSWORD: fight_club
          POSTGRES_DB: fight_club
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fight_club"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd="valkey-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TZ: UTC
      PORT: 3333
      HOST: localhost
      LOG_LEVEL: info
      APP_KEY: test-app-key-that-is-at-least-16-chars
      APP_NAME: FightClub
      NODE_ENV: test
      VITE_APP_URL: http://localhost:3000
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: fight_club
      DB_PASSWORD: fight_club
      DB_DATABASE: fight_club
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      LIMITER_STORE: database

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit backend dependencies
        run: npm audit --audit-level=moderate
        working-directory: backend
        continue-on-error: true

      - name: Lint
        run: npx nx lint fight-club-backend

      - name: Typecheck
        run: npx nx typecheck fight-club-backend

      - name: Test
        run: npx nx test fight-club-backend

  frontend:
    name: Frontend - Audit, Lint, Test, Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: frontend
        continue-on-error: true

      - name: Lint
        run: npx nx lint fight-club-frontend

      - name: Test
        run: npx nx test fight-club-frontend

      - name: Build check
        run: npx nx build fight-club-frontend

