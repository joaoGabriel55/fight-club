services:
  # -- Backend (Web Service) ---------------------------------------------------
  - type: web
    name: fight-club-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: cd .. && npm ci && cd backend && node ace.js migration:run
    startCommand: node ace.js serve
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3333
      - key: LOG_LEVEL
        value: info
      - key: APP_NAME
        value: FightClub
      - key: TZ
        value: UTC
      - key: LIMITER_STORE
        value: database
      - key: TOKEN_EXPIRY
        value: 7 days
      - key: APP_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: VITE_APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # -- Frontend (Static Site) --------------------------------------------------
  - type: web
    name: fight-club-app
    runtime: static
    rootDir: frontend
    buildCommand: cd .. && npm ci && cd frontend && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_NAME
        value: Fight Club
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
