services:
  - type: web
    name: fight-club-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    preDeployCommand: node ace.js migration:run
    dockerCommand: node bin/server.js
    plan: free
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3333
      - key: LOG_LEVEL
        value: info
      - key: APP_NAME
        value: FightClub
      - key: TZ
        value: UTC
      - key: LIMITER_STORE
        value: database
      - key: TOKEN_EXPIRY
        value: 7 days
      - key: APP_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: VITE_APP_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: fight-club-app
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerCommand: nginx -g 'daemon off;'
    plan: free
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_APP_NAME
        value: Fight Club
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
