services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fightclub
      POSTGRES_PASSWORD: fightclub_dev
      POSTGRES_DB: fightclub_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fightclub -d fightclub_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: development
      PORT: 3333
      HOST: "0.0.0.0"
      TZ: UTC
      APP_KEY: "${APP_KEY:-base64:PLACEHOLDER_REPLACE_WITH_GENERATED_KEY_32CHARS=}"
      APP_NAME: FightClub
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: fightclub
      DB_PASSWORD: fightclub_dev
      DB_DATABASE: fightclub_dev
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      VITE_APP_URL: "http://localhost:3000"
      LIMITER_STORE: database
      TOKEN_EXPIRY: "7 days"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: node ace.js serve --hmr

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:3333"
      VITE_APP_NAME: "Fight Club"
    depends_on:
      - backend
    command: npm run dev

volumes:
  pg_data_dev:
